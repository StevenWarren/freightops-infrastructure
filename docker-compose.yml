# DEPRECATED: Use docker-compose.shared.yml + docker-compose.tenant.yml with manage-tenants.sh
# See README.md for multi-tenant setup.

name: freightops-covan

services:
  nginx:
    image: ${DOCKER_REGISTRY-}-nginx:latest
    depends_on: 
      - freightops-api
      - pgadmin
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/docker/config/nginx-covan.conf:/etc/nginx/conf.d/default.conf
      - /home/docker/config/ssl-covan.conf:/etc/nginx/conf.d/ssl.conf
      - /home/docker/config/certbot-conf:/etc/letsencrypt:ro
      - /home/docker/config/certbot-www:/var/www/certbot:ro
    networks: 
      - proxy

  certbot:
    image: certbot/certbot
    env_file: .env
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - /home/docker/config/certbot-conf:/etc/letsencrypt:rw
      - /home/docker/config/certbot-www:/var/www/certbot:rw
    command: ["certonly", "--webroot", "--webroot-path", "/var/www/certbot/", "--non-interactive", "--agree-tos", "-d", "covan.freightopsconnect.com"]

    networks:
      - proxy
  freightops-api:
    container_name: ${API_NAME}
    image: ${DOCKER_REGISTRY-}-api:latest
    restart: unless-stopped
    ports:
      - 5000:5000
    env_file: .env

    environment:
      ConnectionStrings__PgConnection: ${ConnectionStrings__PgConnection}
      ConnectionStrings__AuthConnection: ${ConnectionStrings__AuthConnection}
      ConnectionStrings__CorpConnection: ${ConnectionStrings__CorpConnection}
      PORT: 5000
      ASPNETCORE_HTTP_PORTS: 5000
      ASPNETCORE_ENVIRONMENT: Development
    networks:
      - fo-covan
      - proxy
  
  freightops-daemon:
    image: ${DOCKER_REGISTRY-}-daemon:latest
    env_file: .env
    environment:
      ConnectionStrings__PgConnection: ${ConnectionStrings__PgConnection}
      ConnectionStrings__AuthConnection: ${ConnectionStrings__AuthConnection}
      ConnectionStrings__CorpConnection: ${ConnectionStrings__CorpConnection}      
      OutboxNotifications__Status: "ProStowedEvent" 
      OutboxNotifications__Notification__Type: "api" 
      OutboxNotifications__Notification__Configuration__endpoint: "https://oms.de-well.com/oms/pub/expresstrac/webhook/received" 
      OutboxNotifications__Notification__Configuration__method: "POST" 
      OutboxNotifications__Notification__Configuration__RequiresAuth: "false" 
      OutboxNotifications__Notification__Configuration__Params__0__Key: "Account" 
      OutboxNotifications__Notification__Configuration__Params__0__Value: "Terminal" 
      OutboxNotifications__Notification__Configuration__Params__1__Key: "TrackingNo" 
      OutboxNotifications__Notification__Configuration__Params__1__Value: "ProNumber"
      ASPNETCORE_ENVIRONMENT: Development
    networks:
      - fo-covan

  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4:latest
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_LISTEN_PORT: 5050    
    volumes:
      - pgadmin:/root/.pgadmin
    ports:
      - "5050:5050"
    networks:
      - fo-covan
      - proxy
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    command: --interval 60 --cleanup

networks:
  proxy:    
  fo-covan:
    driver: bridge
volumes:
  covan-dashboard:
  pgadmin:
