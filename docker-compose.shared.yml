# Shared infrastructure - nginx reverse proxy, certbot, pgadmin, watchtower
# Run with: docker compose -f docker-compose.shared.yml --env-file .env.shared up -d
# Tenant services are started separately via manage-tenants.sh

name: freightops-shared

services:
  nginx-proxy:
    container_name: freightops-nginx-proxy
    image: nginx:alpine
    depends_on:
      - pgadmin
    env_file: .env.shared
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/nginx/ssl.conf:/etc/nginx/conf.d/ssl.conf:ro
      - ./config/certbot-conf:/etc/letsencrypt:ro
      - ./config/certbot-www:/var/www/certbot:ro
    networks:
      - proxy
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    env_file: .env.shared
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
    volumes:
      - ./config/certbot-conf:/etc/letsencrypt:rw
      - ./config/certbot-www:/var/www/certbot:rw
    command: ["certonly", "--webroot", "--webroot-path", "/var/www/certbot/", "--non-interactive", "--agree-tos", "-d", "covan.freightopsconnect.com"]
    networks:
      - proxy

  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4:latest
    env_file: .env.shared
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      PGADMIN_LISTEN_PORT: 5050
    volumes:
      - pgadmin:/root/.pgadmin
    ports:
      - "5050:5050"
    networks:
      - proxy
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json
    command: --interval 60 --cleanup
    networks:
      - proxy

networks:
  proxy:
    name: freightops-proxy

volumes:
  pgadmin:
